<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Pricing Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-width: 350px;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #4a5568;
            margin-bottom: 30px;
            font-size: 2em;
            font-weight: 600;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .data-card {
            background: #f7fafc;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #667eea;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .data-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .data-label {
            font-size: 0.9em;
            color: #718096;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .data-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #2d3748;
        }

        .price-value {
            color: #48bb78;
        }

        .demand-value {
            color: #4299e1;
        }

        .tier-low {
            color: #48bb78;
            background: #c6f6d5;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .tier-medium {
            color: #ed8936;
            background: #fed7aa;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .tier-high {
            color: #f56565;
            background: #fed7d7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
        }

        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .status.loading {
            background: #e6fffa;
            color: #319795;
        }

        .status.error {
            background: #fed7d7;
            color: #c53030;
        }

        .status.success {
            background: #c6f6d5;
            color: #276749;
        }

        .last-updated {
            margin-top: 20px;
            font-size: 0.8em;
            color: #a0aec0;
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dynamic Pricing Dashboard</h1>
        
        <div class="data-grid">
            <div class="data-card">
                <div class="data-label">Current Demand</div>
                <div class="data-value demand-value" id="demand">--</div>
            </div>
            
            <div class="data-card">
                <div class="data-label">Current Price</div>
                <div class="data-value price-value" id="price">$--</div>
            </div>
            
            <div class="data-card">
                <div class="data-label">Pricing Tier</div>
                <div class="data-value" id="tier">--</div>
            </div>
        </div>
        
        <div class="status" id="status">Initializing...</div>
        <div class="last-updated" id="lastUpdated">Last updated: --</div>
    </div>

    <script>
        let updateInterval;
        
        async function fetchPriceData() {
            const statusEl = document.getElementById('status');
            const demandEl = document.getElementById('demand');
            const priceEl = document.getElementById('price');
            const tierEl = document.getElementById('tier');
            const lastUpdatedEl = document.getElementById('lastUpdated');
            
            try {
                statusEl.textContent = 'Fetching data...';
                statusEl.className = 'status loading';
                
                const response = await fetch('http://localhost:5000/price');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Update display
                demandEl.textContent = data.demand;
                priceEl.textContent = `$${data.price}`;
                
                // Update tier with appropriate styling
                tierEl.textContent = data.pricing_tier;
                tierEl.className = `data-value tier-${data.pricing_tier.toLowerCase()}`;
                
                // Update status
                statusEl.textContent = 'Data updated successfully';
                statusEl.className = 'status success';
                
                // Update timestamp
                const now = new Date();
                lastUpdatedEl.textContent = `Last updated: ${now.toLocaleTimeString()}`;
                
            } catch (error) {
                console.error('Error fetching price data:', error);
                statusEl.textContent = `Error: ${error.message}`;
                statusEl.className = 'status error';
            }
        }
        
        function startAutoUpdate() {
            // Initial fetch
            fetchPriceData();
            
            // Set up interval for updates every 3 seconds
            updateInterval = setInterval(fetchPriceData, 3000);
        }
        
        function stopAutoUpdate() {
            if (updateInterval) {
                clearInterval(updateInterval);
            }
        }
        
        // Start the application
        document.addEventListener('DOMContentLoaded', startAutoUpdate);
        
        // Clean up when page is unloaded
        window.addEventListener('beforeunload', stopAutoUpdate);
    </script>
</body>
</html>
