<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Real-Time Pricing System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .forgot-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .forgot-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .forgot-header h1 {
            color: #2d3748;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .forgot-header p {
            color: #718096;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
        }

        .alert-error {
            background-color: #fed7d7;
            color: #c53030;
            border: 1px solid #feb2b2;
        }

        .alert-success {
            background-color: #c6f6d5;
            color: #2f855a;
            border: 1px solid #9ae6b4;
        }

        .alert-info {
            background-color: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .demo-info {
            background-color: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #4a5568;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-header">
            <h1>🔐 Forgot Password</h1>
            <p>Reset your account password</p>
        </div>

        <div class="demo-info">
            <strong>📋 Demo Mode:</strong><br>
            For demo purposes, any registered email will work and show a reset code.
        </div>

        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>
        <div class="alert alert-info" id="infoAlert"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your registered email">
            </div>

            <button type="submit" class="btn" id="resetBtn">Send Reset Instructions</button>
            <div class="loading" id="loading">Sending reset instructions...</div>
        </form>

        <div class="back-link">
            <p><a href="login.html">← Back to Login</a></p>
            <p>Don't have an account? <a href="register.html">Register here</a></p>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            
            // Show loading
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            // Hide alerts
            document.getElementById('errorAlert').style.display = 'none';
            document.getElementById('successAlert').style.display = 'none';
            document.getElementById('infoAlert').style.display = 'none';
            
            try {
                const response = await fetch('http://localhost:5000/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Show success with demo code
                    document.getElementById('successAlert').textContent = data.message;
                    document.getElementById('successAlert').style.display = 'block';
                    
                    if (data.demo_reset_code) {
                        document.getElementById('infoAlert').innerHTML = 
                            `<strong>Demo Reset Code:</strong> ${data.demo_reset_code}<br>
                             In a real application, this would be sent to your email.`;
                        document.getElementById('infoAlert').style.display = 'block';
                    }
                    
                    // Disable form
                    document.getElementById('email').disabled = true;
                    document.getElementById('resetBtn').style.display = 'none';
                    document.getElementById('loading').style.display = 'none';
                    
                } else {
                    // Show error
                    document.getElementById('errorAlert').textContent = data.message || 'Request failed';
                    document.getElementById('errorAlert').style.display = 'block';
                }
                
            } catch (error) {
                document.getElementById('errorAlert').textContent = 'Network error. Please try again.';
                document.getElementById('errorAlert').style.display = 'block';
            } finally {
                // Hide loading if not successful
                if (!document.getElementById('successAlert').style.display || 
                    document.getElementById('successAlert').style.display === 'none') {
                    document.getElementById('resetBtn').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                }
            }
        });
    </script>
</body>
</html>
